<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Acceso Admin - NortFood</title>

    <!-- PWA Manifest para NortFood -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FB8C00">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="blank-translucent">
    <meta name="apple-mobile-web-app-title" content="NortFood">
    <link rel="apple-touch-icon" href="/static/img/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/img/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/img/icon-512x512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-principal: #38b087;
            --bg-body: #f4f9f4;
            --texto-oscuro: #2c3e50;
            --texto-suave: #7f8c8d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-body);
            color: var(--texto-oscuro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .contenedor {
            max-width: 380px;
            width: 100%;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ilustracion {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px auto;
            background: linear-gradient(135deg, var(--color-principal), #2d8a6e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(56, 176, 135, 0.3);
        }

        .ilustracion svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: white;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .formulario {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        .formulario h2 {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .formulario p {
            font-size: 14px;
            color: var(--texto-suave);
            margin-bottom: 20px;
        }

        .campo {
            margin-bottom: 16px;
        }

        .campo input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            color: var(--texto-oscuro);
            outline: none;
            transition: border-color 0.2s ease;
        }

        .campo input:focus {
            border-color: var(--color-principal);
            box-shadow: 0 0 0 3px rgba(56,176,135,0.15);
        }

        .btn-admin {
            width: 100%;
            padding: 14px;
            background: var(--color-principal);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 176, 135, 0.35);
        }

        .error-msg {
            background: #fdeaea;
            border: 1px solid #f5c6cb;
            color: #c0392b;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .volver {
            display: inline-block;
            margin-top: 20px;
            font-size: 13px;
            color: var(--texto-suave);
            text-decoration: none;
        }

        .volver:hover {
            color: var(--color-principal);
        }

        @media (prefers-reduced-motion: reduce) {
            .contenedor { animation: none; }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="ilustracion" role="img" aria-label="Admin">
            <svg viewBox="0 0 24 24">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        </div>

        <div class="formulario">
            <h2>Acceso Administrador</h2>
            <p>Ingresá la contraseña de superadmin</p>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form action="/superadmin" method="POST">
                <div class="campo">
                    <input type="password" name="password" placeholder="Contraseña de admin" required>
                </div>
                <button type="submit" class="btn-admin">Ingresar</button>
            </form>
        </div>

        <a href="/login" class="volver">Volver al login</a>
    </div>
</body>
</html>
