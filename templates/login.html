<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Iniciar Sesión - NortFood</title>

    <!-- PWA Manifest para NortFood -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FB8C00">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="blank-translucent">
    <meta name="apple-mobile-web-app-title" content="NortFood">
    <link rel="apple-touch-icon" href="/static/img/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/img/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/img/icon-512x512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-principal: #38b087;
            --bg-body: #f4f9f4;
            --texto-oscuro: #2c3e50;
            --texto-suave: #7f8c8d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-body);
            color: var(--texto-oscuro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .contenedor {
            max-width: 420px;
            width: 100%;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--color-principal);
        }

        .logo h1 span {
            color: var(--texto-oscuro);
        }

        .logo p {
            font-size: 14px;
            color: var(--texto-suave);
            margin-top: 5px;
        }

        .formulario {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .formulario h2 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
        }

        .campo {
            margin-bottom: 16px;
        }

        .campo label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--texto-oscuro);
            margin-bottom: 6px;
        }

        .campo input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            color: var(--texto-oscuro);
            outline: none;
            transition: border-color 0.2s ease;
        }

        .campo input:focus {
            border-color: var(--color-principal);
            box-shadow: 0 0 0 3px rgba(56,176,135,0.15);
        }

        .campo input::placeholder {
            color: #bbb;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--color-principal);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 5px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 176, 135, 0.35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            background: #fdeaea;
            border: 1px solid #f5c6cb;
            color: #c0392b;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }

        .info-msg {
            background: #fff8e1;
            border: 1px solid #ffe082;
            color: #f57f17;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }

        .pie {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--texto-suave);
        }

        .pie a {
            color: var(--color-principal);
            text-decoration: none;
            font-weight: 700;
        }

        .pie a:hover {
            text-decoration: underline;
        }

        .login-switch-bar {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .login-switch-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 8px;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            text-decoration: none;
            color: var(--texto-suave);
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        .login-switch-item:hover {
            border-color: var(--color-principal);
            color: var(--color-principal);
            background: rgba(56, 176, 135, 0.05);
        }
        .login-switch-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        @media (prefers-reduced-motion: reduce) {
            .contenedor { animation: none; }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="logo">
            <h1>Nort<span>Food</span></h1>
            <p>Ingresá a tu negocio</p>
        </div>

        <div class="formulario">
            <h2>Iniciar Sesión</h2>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            {% if info %}
            <div class="info-msg">{{ info }}</div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="campo">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Tu usuario" required>
                </div>

                <div class="campo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                </div>

                <button type="submit" class="btn-login">Ingresar</button>
            </form>
        </div>

        <p class="pie">¿No tenés cuenta? <a href="/registro">Registrate</a></p>

        <div class="login-switch-bar">
            <a href="/cliente/login" class="login-switch-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Soy cliente</span>
            </a>
            <a href="/repartidor" class="login-switch-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                <span>Soy repartidor</span>
            </a>
        </div>
    </div>
</body>
</html>
