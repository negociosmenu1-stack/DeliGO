<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Registro Cliente - NortFood</title>

    <!-- PWA Manifest para NortFood -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FB8C00">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="blank-translucent">
    <meta name="apple-mobile-web-app-title" content="NortFood">
    <link rel="apple-touch-icon" href="/static/img/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/img/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/img/icon-512x512.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background-color: #f4f9f4; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div style="background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; color: #38b087; margin-bottom: 20px;">Crear mi cuenta</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div style="background: {{ '#ffebea' if category == 'error' else '#e8f5ef' }}; color: {{ '#c62828' if category == 'error' else '#2e7d32' }}; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; font-size: 14px;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Botón Google -->
        <a href="/cliente/login/google" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; text-decoration: none; color: #333; font-weight: bold; margin-bottom: 20px; transition: background 0.2s;">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Registrarme con Google
        </a>

        <div style="text-align: center; color: #999; margin-bottom: 15px; font-size: 14px;">— o con email —</div>

        <form action="/cliente/registro" method="POST" style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" name="nombre" placeholder="Tu nombre completo" required style="padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none;">
            <input type="email" name="email" placeholder="Tu email" required style="padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none;">
            <input type="tel" name="telefono" placeholder="Teléfono (Opcional)" style="padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none;">
            <input type="password" name="password" placeholder="Contraseña (mínimo 6 caracteres)" required style="padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none;">
            <button type="submit" style="background: #38b087; color: white; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px;">Crear Cuenta</button>
        </form>
        <p style="text-align: center; margin-top: 15px; font-size: 14px;">¿Ya tienes cuenta? <a href="/cliente/login" style="color: #38b087; font-weight: bold;">Inicia sesión</a></p>
    </div>
</body>
</html>
