<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF6C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
  <!-- Delivery box -->
  <rect x="120" y="170" width="272" height="200" rx="16" ry="16" fill="white" opacity="0.95"/>
  <!-- Box flap left -->
  <path d="M120 170 L120 130 L256 110 L256 170 Z" fill="white" opacity="0.85"/>
  <!-- Box flap right -->
  <path d="M392 170 L392 130 L256 110 L256 170 Z" fill="#FFF3E0" opacity="0.85"/>
  <!-- Box tape -->
  <rect x="236" y="130" width="40" height="240" rx="4" ry="4" fill="#FB8C00" opacity="0.6"/>
  <!-- Location pin -->
  <g transform="translate(320, 100)">
    <path d="M0-48 C26.5-48 48-26.5 48 0 C48 26.5 0 72 0 72 C0 72-48 26.5-48 0 C-48-26.5-26.5-48 0-48Z" fill="white" opacity="0.95"/>
    <circle cx="0" cy="0" r="18" fill="#FB8C00"/>
  </g>
  <!-- Speed lines -->
  <line x1="60" y1="240" x2="100" y2="240" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="50" y1="270" x2="90" y2="270" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="65" y1="300" x2="105" y2="300" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
</svg>
